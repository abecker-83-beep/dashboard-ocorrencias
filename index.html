<script>
  const arquivoCSV = "Base-Ocorrências.csv";

  let dadosOriginais = [];
  let graficoUF = null;
  let graficoTratativas = null;
  let graficoMensal = null;

  function mostrarErro(msg) {
    const box = document.getElementById("erro");
    box.style.display = "block";
    box.textContent = msg;
  }

  function limparErro() {
    const box = document.getElementById("erro");
    box.style.display = "none";
    box.textContent = "";
  }

  function formatarNumero(valor) {
    return Number(valor || 0).toLocaleString("pt-BR");
  }

  function normalizarTexto(v) {
    return (v || "").toString().trim();
  }

  function normalizarTratativa(v) {
    const txt = normalizarTexto(v).toUpperCase();
    if (txt.includes("ABAT")) return "ABATIMENTO";
    if (txt.includes("BON")) return "BONIFICAÇÃO";
    if (txt.includes("DEV")) return "DEVOLUÇÃO";
    if (txt.includes("SEM")) return "SEM RETORNO";
    return txt || "OUTROS";
  }

  function toNumber(v) {
    let valor = (v || "0").toString().trim();
    if (!valor) return 0;

    valor = valor.replace(/\./g, "").replace(",", ".");
    return parseFloat(valor) || 0;
  }

  function parseDataBr(dataStr) {
    const txt = normalizarTexto(dataStr);
    if (!txt) return null;

    const partes = txt.split("/");
    if (partes.length !== 3) return null;

    const [dia, mes, ano] = partes;
    const data = new Date(`${ano}-${mes}-${dia}T00:00:00`);
    return isNaN(data.getTime()) ? null : data;
  }

  function contarValores(dados, campo) {
    const mapa = {};
    dados.forEach(linha => {
      const valor = normalizarTexto(linha[campo]);
      if (valor) mapa[valor] = (mapa[valor] || 0) + 1;
    });
    return mapa;
  }

  function somarValores(dados, campoGrupo, campoValor) {
    const mapa = {};
    dados.forEach(linha => {
      const grupo = normalizarTexto(linha[campoGrupo]);
      const valor = toNumber(linha[campoValor]);
      if (grupo) mapa[grupo] = (mapa[grupo] || 0) + valor;
    });
    return mapa;
  }

  function contarTratativas(dados) {
    const mapa = {};
    dados.forEach(linha => {
      const trat = normalizarTratativa(linha["TRATATIVA"]);
      mapa[trat] = (mapa[trat] || 0) + 1;
    });
    return mapa;
  }

  function contarPorMes(dados) {
    const mapa = {};
    dados.forEach(linha => {
      const data = parseDataBr(linha["DATA"]);
      if (!data) return;

      const chave = String(data.getMonth() + 1).padStart(2, "0") + "/" + data.getFullYear();
      mapa[chave] = (mapa[chave] || 0) + 1;
    });

    return Object.entries(mapa).sort((a, b) => {
      const [ma, aa] = a[0].split("/");
      const [mb, ab] = b[0].split("/");
      return new Date(`${aa}-${ma}-01`) - new Date(`${ab}-${mb}-01`);
    });
  }

  function topN(obj, limite) {
    return Object.entries(obj)
      .sort((a, b) => b[1] - a[1])
      .slice(0, limite);
  }

  function renderLista(id, lista) {
    const el = document.getElementById(id);
    el.innerHTML = "";

    if (!lista.length) {
      el.innerHTML = `<div class="list-item"><span>Sem dados</span><span class="badge">0</span></div>`;
      return;
    }

    lista.forEach(([nome, valor]) => {
      const div = document.createElement("div");
      div.className = "list-item";
      div.innerHTML = `
        <span title="${nome}">${nome}</span>
        <span class="badge">${formatarNumero(valor)}</span>
      `;
      el.appendChild(div);
    });
  }

  function renderRanking(id, lista) {
    const el = document.getElementById(id);
    el.innerHTML = "";

    if (!lista.length) {
      el.innerHTML = `<div class="ranking-item"><div class="ranking-pos">0</div><div class="ranking-name">Sem dados</div><div class="ranking-value">0</div></div>`;
      return;
    }

    lista.forEach(([nome, valor], index) => {
      const div = document.createElement("div");
      div.className = "ranking-item";
      div.innerHTML = `
        <div class="ranking-pos">${index + 1}</div>
        <div class="ranking-name" title="${nome}">${nome}</div>
        <div class="ranking-value">${formatarNumero(valor)}</div>
      `;
      el.appendChild(div);
    });
  }

  function preencherFiltros(dados) {
    const selectUF = document.getElementById("ufFiltro");
    const selectREP = document.getElementById("repFiltro");

    selectUF.innerHTML = `<option value="">Todos UF</option>`;
    selectREP.innerHTML = `<option value="">Todos REP</option>`;

    const ufs = [...new Set(dados.map(d => normalizarTexto(d["UF"])).filter(Boolean))].sort();
    const reps = [...new Set(dados.map(d => normalizarTexto(d["REP"])).filter(Boolean))].sort();

    ufs.forEach(uf => {
      const opt = document.createElement("option");
      opt.value = uf;
      opt.textContent = uf;
      selectUF.appendChild(opt);
    });

    reps.forEach(rep => {
      const opt = document.createElement("option");
      opt.value = rep;
      opt.textContent = rep;
      selectREP.appendChild(opt);
    });
  }

  function atualizarMetricas(dados) {
    document.getElementById("ocorrencias").textContent = formatarNumero(dados.length);
    document.getElementById("clientes").textContent = formatarNumero(
      new Set(dados.map(x => normalizarTexto(x["CLIENTE"])).filter(Boolean)).size
    );
    document.getElementById("produtos").textContent = formatarNumero(
      new Set(dados.map(x => normalizarTexto(x["PRODUTO"])).filter(Boolean)).size
    );

    const tratativas = contarTratativas(dados);
    document.getElementById("tratAbatimento").textContent = formatarNumero(tratativas["ABATIMENTO"] || 0);
    document.getElementById("tratBonificacao").textContent = formatarNumero(tratativas["BONIFICAÇÃO"] || 0);
    document.getElementById("tratDevolucao").textContent = formatarNumero(tratativas["DEVOLUÇÃO"] || 0);
    document.getElementById("tratSemRetorno").textContent = formatarNumero(tratativas["SEM RETORNO"] || 0);
  }

  function atualizarGraficos(dados) {
    const dadosUF = topN(contarValores(dados, "UF"), 5);
    const ctxUF = document.getElementById("graficoUF").getContext("2d");

    if (graficoUF) graficoUF.destroy();

    graficoUF = new Chart(ctxUF, {
      type: "bar",
      data: {
        labels: dadosUF.map(x => x[0]),
        datasets: [{
          label: "Ocorrências",
          data: dadosUF.map(x => x[1]),
          backgroundColor: "rgba(96, 165, 250, 0.75)",
          borderColor: "rgba(59, 130, 246, 1)",
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { precision: 0 }
          }
        }
      }
    });

    const trat = contarTratativas(dados);
    const ordemTrat = ["ABATIMENTO", "DEVOLUÇÃO", "SEM RETORNO", "BONIFICAÇÃO"];
    const ctxTrat = document.getElementById("graficoTratativas").getContext("2d");

    if (graficoTratativas) graficoTratativas.destroy();

    graficoTratativas = new Chart(ctxTrat, {
      type: "pie",
      data: {
        labels: ordemTrat,
        datasets: [{
          data: ordemTrat.map(k => trat[k] || 0),
          backgroundColor: ["#4ea8de", "#ff6384", "#ff9f40", "#f9c74f"]
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });

    const mensal = contarPorMes(dados);
    const ctxMensal = document.getElementById("graficoMensal").getContext("2d");

    if (graficoMensal) graficoMensal.destroy();

    graficoMensal = new Chart(ctxMensal, {
      type: "line",
      data: {
        labels: mensal.map(x => x[0]),
        datasets: [{
          label: "Ocorrências",
          data: mensal.map(x => x[1]),
          borderColor: "#1d4ed8",
          backgroundColor: "rgba(29, 78, 216, 0.15)",
          tension: 0.25,
          fill: false,
          pointRadius: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { precision: 0 }
          }
        }
      }
    });
  }

  function atualizarRanking(dados) {
    renderRanking("rankingProdutos", topN(somarValores(dados, "PRODUTO", "QTD"), 20));
    renderRanking("rankingClientes", topN(contarValores(dados, "CLIENTE"), 20));
    renderRanking("rankingReps", topN(contarValores(dados, "REP"), 20));
  }

  function atualizarDashboardCompleto(dados) {
    atualizarMetricas(dados);
    renderLista("topProdutos", topN(somarValores(dados, "PRODUTO", "QTD"), 5));
    renderLista("topClientes", topN(contarValores(dados, "CLIENTE"), 5));
    renderLista("topReps", topN(contarValores(dados, "REP"), 5));
    atualizarGraficos(dados);
    atualizarRanking(dados);
  }

  function obterDadosFiltrados() {
    let dados = [...dadosOriginais];

    const dataInicio = document.getElementById("dataInicio").value;
    const dataFim = document.getElementById("dataFim").value;
    const mes = document.getElementById("mesFiltro").value;
    const uf = document.getElementById("ufFiltro").value;
    const rep = document.getElementById("repFiltro").value;

    if (dataInicio) {
      const dtIni = new Date(dataInicio + "T00:00:00");
      dados = dados.filter(d => {
        const dt = parseDataBr(d["DATA"]);
        return dt && dt >= dtIni;
      });
    }

    if (dataFim) {
      const dtFim = new Date(dataFim + "T23:59:59");
      dados = dados.filter(d => {
        const dt = parseDataBr(d["DATA"]);
        return dt && dt <= dtFim;
      });
    }

    if (mes) {
      dados = dados.filter(d => {
        const dt = parseDataBr(d["DATA"]);
        if (!dt) return false;
        return String(dt.getMonth() + 1).padStart(2, "0") === mes;
      });
    }

    if (uf) {
      dados = dados.filter(d => normalizarTexto(d["UF"]) === uf);
    }

    if (rep) {
      dados = dados.filter(d => normalizarTexto(d["REP"]) === rep);
    }

    return dados;
  }

  function aplicarFiltros() {
    const dadosFiltrados = obterDadosFiltrados();
    atualizarDashboardCompleto(dadosFiltrados);
  }

  function limparFiltros() {
    document.getElementById("dataInicio").value = "";
    document.getElementById("dataFim").value = "";
    document.getElementById("mesFiltro").value = "";
    document.getElementById("ufFiltro").value = "";
    document.getElementById("repFiltro").value = "";
    atualizarDashboardCompleto(dadosOriginais);
  }

  function trocarAba(aba) {
    document.getElementById("tabDashboard").classList.toggle("active", aba === "dashboard");
    document.getElementById("tabRanking").classList.toggle("active", aba === "ranking");
    document.getElementById("viewDashboard").classList.toggle("hidden", aba !== "dashboard");
    document.getElementById("viewRanking").classList.toggle("hidden", aba !== "ranking");
  }

  async function carregarCSV() {
    try {
      limparErro();

      const resposta = await fetch(arquivoCSV + "?v=" + new Date().getTime());
      if (!resposta.ok) {
        throw new Error("Não foi possível carregar o CSV.");
      }

      const buffer = await resposta.arrayBuffer();

      let texto;
      try {
        texto = new TextDecoder("windows-1252").decode(buffer);
      } catch (e) {
        texto = new TextDecoder("iso-8859-1").decode(buffer);
      }

      const resultado = Papa.parse(texto, {
        header: true,
        delimiter: ";",
        skipEmptyLines: true
      });

      if (!resultado.data || !resultado.data.length) {
        mostrarErro("O CSV foi carregado, mas veio vazio.");
        return;
      }

      const dados = resultado.data.filter(linha =>
        normalizarTexto(linha["CLIENTE"]) ||
        normalizarTexto(linha["PRODUTO"]) ||
        normalizarTexto(linha["UF"])
      );

      if (!dados.length) {
        mostrarErro("Nenhum registro válido foi encontrado no CSV.");
        return;
      }

      dadosOriginais = dados;
      preencherFiltros(dadosOriginais);
      atualizarDashboardCompleto(dadosOriginais);
    } catch (erro) {
      mostrarErro("Erro ao carregar o CSV: " + erro.message);
    }
  }

  document.getElementById("btnAplicar").addEventListener("click", aplicarFiltros);
  document.getElementById("btnLimpar").addEventListener("click", limparFiltros);
  document.getElementById("tabDashboard").addEventListener("click", () => trocarAba("dashboard"));
  document.getElementById("tabRanking").addEventListener("click", () => trocarAba("ranking"));

  carregarCSV();
</script>
